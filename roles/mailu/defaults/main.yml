# Default variables for Mailu role
mailu_enable_admin: true
mailu_persistence_size: 500Mi
mailu_redis_size: 150Mi
mailu_clamav_size: 150Mi
mailu_storage_class: longhorn-single-replica
mailu_enable_clamav: false
mailu_enable_oletools: false
mailu_enable_tika: false
mailu_roundcube_password: "someStrongPassword"
mailu_secret_key: "someSecretKey"

mailu_chart_version: "2.6.3"

# Subnet used for both the Helm `subnet` value (becomes Mailu's SUBNET env var
# and defines Postfix mynetworks) and rspamd's DKIM `sign_networks`.
# Defaults to the K3s/Flannel pod CIDR; override per-cluster in secrets.prod.yml.
mailu_subnet: "10.42.0.0/16"
